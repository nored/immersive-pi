# All 13 nodes provisioned from one playbook. Static IPs on the dedicated switch;
# mDNS names pi-01..pi-13. Adjust addresses to your switch's subnet.

[render]
pi-01 ansible_host=10.0.0.1  node_id=pi-01
pi-02 ansible_host=10.0.0.2  node_id=pi-02
pi-03 ansible_host=10.0.0.3  node_id=pi-03
pi-04 ansible_host=10.0.0.4  node_id=pi-04
pi-05 ansible_host=10.0.0.5  node_id=pi-05
pi-06 ansible_host=10.0.0.6  node_id=pi-06
pi-07 ansible_host=10.0.0.7  node_id=pi-07
pi-08 ansible_host=10.0.0.8  node_id=pi-08
pi-09 ansible_host=10.0.0.9  node_id=pi-09
pi-10 ansible_host=10.0.0.10 node_id=pi-10
pi-11 ansible_host=10.0.0.11 node_id=pi-11
pi-12 ansible_host=10.0.0.12 node_id=pi-12

[control]
pi-13 ansible_host=10.0.0.13 node_id=pi-13

# During the first two-node install, limit the run:
#   ansible-playbook site.yml --limit 'pi-01,pi-02,pi-13'
[fleet:children]
render
control
