---
# One playbook provisions all 13 nodes. Order matters: lay down code + base
# config everywhere, configure the two roles, then harden last (overlayfs makes
# the root read-only, so every writable change must happen before it).
#
#   ansible-playbook site.yml                      # all 13
#   ansible-playbook site.yml --limit pi-07        # one swapped node
#   ansible-playbook site.yml --tags hardening     # just (re)apply hardening
#   ansible-playbook site.yml -e overlayfs_enabled=false   # open a node for edits

- name: Base image for every node
  hosts: fleet
  roles:
    - role: common

- name: Render nodes
  hosts: render
  roles:
    - role: render

- name: Control node
  hosts: control
  roles:
    - role: control

- name: Field hardening (run last — makes root read-only)
  hosts: fleet
  roles:
    - role: hardening
      tags: [hardening]
