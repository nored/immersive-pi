---
# Render node: GL/KMS + decode deps, per-node config, the render service, and
# the KMS boot config. Boots to a known state with no manual touch — mount
# config, join the clock, wait for play.

- name: Render-node packages (GL/KMS + hardware decode + preview JPEG)
  ansible.builtin.apt:
    name:
      - gstreamer1.0-plugins-good
      - gstreamer1.0-plugins-bad
      - gstreamer1.0-libav
      - libgles2
      - libegl1
      - libgbm1
      - libdrm2
      - python3-numpy
      - python3-websockets
      - python3-pil          # preview JPEG encode
    state: present

- name: Per-node config.json
  ansible.builtin.template:
    src: config.json.j2
    dest: "{{ immersive_root }}/render-node/config.json"
    mode: "0644"
  notify: restart render

- name: KMS + console boot config
  ansible.builtin.copy:
    dest: /etc/immersive-boot.conf
    mode: "0644"
    content: |
      # Applied to /boot/firmware/config.txt by the line-in-file tasks below.
      # vc4-kms-v3d is the full KMS driver the GL/GBM/DRM stage needs.
  changed_when: false

- name: Enable full KMS driver
  ansible.builtin.lineinfile:
    path: /boot/firmware/config.txt
    line: "dtoverlay=vc4-kms-v3d"
    create: false
  notify: reboot node

- name: Give the GPU enough CMA for 1080p decode + GL
  ansible.builtin.lineinfile:
    path: /boot/firmware/config.txt
    line: "dtoverlay=vc4-kms-v3d,cma-256"
    regexp: '^dtoverlay=vc4-kms-v3d'
  notify: reboot node

- name: Disable swap (read-only root has nowhere to swap; avoids card wear)
  ansible.builtin.systemd:
    name: dphys-swapfile
    enabled: false
    state: stopped
  failed_when: false

- name: Install the render service
  ansible.builtin.copy:
    src: "{{ immersive_root }}/render-node/systemd/render.service"
    remote_src: true
    dest: /etc/systemd/system/render.service
    mode: "0644"
  notify: restart render

- name: Enable + start the render service
  ansible.builtin.systemd:
    name: render.service
    enabled: true
    state: started
    daemon_reload: true

- name: Record service name for the common restart handler
  ansible.builtin.set_fact:
    immersive_services: ["render.service"]
