---
# Control node: clock master + controller + calibration web. Renders no video.
# The room-model lives here under git so every saved calibration is recoverable.

- name: Control-node packages
  ansible.builtin.apt:
    name:
      - python3-websockets
      - python3-numpy
      - python3-opencv      # structured-light scan camera (Milestone 4)
    state: present

- name: Ensure the room-model is a git repo (versioned calibration history)
  ansible.builtin.command:
    cmd: git init
    chdir: "{{ immersive_root }}/control-node"
    creates: "{{ immersive_root }}/control-node/.git"

- name: Identify git for calibration commits
  community.general.git_config:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    scope: global
  loop:
    - { name: "user.name",  value: "immersive control" }
    - { name: "user.email", value: "control@immersive-pi.local" }

- name: First commit of the room-model if none yet
  ansible.builtin.shell: |
    cd {{ immersive_root }}/control-node
    git add room-model.json
    git diff --cached --quiet || git commit -m "provision: initial room-model"
  register: rm_commit
  changed_when: "'nothing to commit' not in rm_commit.stdout"
  failed_when: false

- name: Install clock + controller services
  ansible.builtin.copy:
    src: "{{ immersive_root }}/control-node/systemd/{{ item }}"
    remote_src: true
    dest: "/etc/systemd/system/{{ item }}"
    mode: "0644"
  loop:
    - clock.service
    - controller.service

- name: Enable + start control services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - clock.service
    - controller.service

- name: Record service names for the common restart handler
  ansible.builtin.set_fact:
    immersive_services: ["clock.service", "controller.service"]
